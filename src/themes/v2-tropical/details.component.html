<div class="tropic-navbar">
  <div class="tropic-brand">
    <span class="brand-emoji">🍓</span>
    <span class="brand-name">FruitShop</span>
  </div>
  <a routerLink="/product" class="back-link">← Back to Fruits</a>
</div>

<div class="tropic-details-layout">

  <!-- Left: colorful sidebar -->
  <div class="details-sidebar">
    <div class="sidebar-bg-art"></div>
    <div class="sidebar-content">
      <div class="big-fruit-emoji">🍎</div>
      <img src="./assets/apple.jpg" alt="Apple" class="details-img-tropic" />
      <div class="star-rating">⭐ ⭐ ⭐ ⭐ ⭐</div>
      <div class="review-count">128 happy customers!</div>
    </div>
  </div>

  <!-- Right: product info -->
  <div class="details-main">
    <div class="product-category-badge">🌿 Fresh Fruits</div>
    <h1 class="details-product-name-tropic">Apple</h1>
    <p class="product-tagline">Crisp, juicy, and absolutely delicious!</p>

    <div class="price-section">
      <span class="big-price">₹30</span>
      <span class="crossed-price">₹33</span>

    <div class="feature-pills">

      <span class="feature-pill">🌿 Organic</span>
      <span class="feature-pill">💊 Vitamin Rich</span>

      <div class="seller-avatar">🏪</div>
      <div>
        <div class="seller-name-tropic">ABC Fruits</div>
        <div class="seller-tag">Verified Premium Seller</div>
      </div>
    </div>

    <div class="cta-group">
      <a href="cart" class="btn-buy-tropic">Buy Now 🛒</a>
      <a href="cart" class="btn-cart-tropic">Add to Cart</a>
    </div>

    <div class="review-form-tropic">
      <h3 class="form-heading">Leave a Review 💬</h3>
      <form>
        <textarea class="tropic-textarea" rows="4" placeholder="Tell us about your experience! 😊"></textarea>
        <button type="submit" class="btn-submit-tropic">Submit Review ✨</button>
      </form>
    </div>
  </div>
</div>
